<main class="profile-complete">
  <div class="container">
    <h1>Complete your profile</h1>
    <p>Add your name to continue. You can also choose a screen name for public comments.</p>

    <form id="comment-profile-form">
      <label>
        Name
        <input type="text" id="profile-name" required />
      </label>

      <label>
        Screen name (optional)
        <input type="text" id="profile-username" />
      </label>

      <button type="submit">Continue</button>
    </form>
  </div>
</main>
